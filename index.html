<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pair Trading Dashboard</title>
</head>
<body>

<h1>📊 Pair Trading Dashboard</h1>

<hr>

<h2>▶ シグナル実行</h2>
<button onclick="run()">RUN</button>

<hr>

<h2>📥 ENTRY</h2>
<form id="entryForm">
  Pair: <input name="pair"><br>
  Price1: <input name="p1"><br>
  Price2: <input name="p2"><br>
  Qty1: <input name="q1"><br>
  Qty2: <input name="q2"><br>
  <button type="submit">ENTRY</button>
</form>

<hr>

<h2>📤 EXIT</h2>
<form id="exitForm">
  Pair: <input name="pair"><br>
  Price1: <input name="p1"><br>
  Price2: <input name="p2"><br>
  <button type="submit">EXIT</button>
</form>

<hr>

<h2>📊 Positions</h2>
<button onclick="load()">Reload</button>

<pre id="out"></pre>

<script>

async function run(){
  const res = await fetch("/run", {method:"POST"})
  const data = await res.json()
  alert(JSON.stringify(data))
}

document.getElementById("entryForm").onsubmit = async (e) => {
  e.preventDefault()
  const f = new FormData(e.target)

  const res = await fetch("/entry", {
    method: "POST",
    body: f
  })

  alert(JSON.stringify(await res.json()))
}

document.getElementById("exitForm").onsubmit = async (e) => {
  e.preventDefault()
  const f = new FormData(e.target)

  const res = await fetch("/exit", {
    method: "POST",
    body: f
  })

  alert(JSON.stringify(await res.json()))
}

async function load(){
  const res = await fetch("/positions")
  const data = await res.json()
  document.getElementById("out").innerText = JSON.stringify(data, null, 2)
}

</script>

</body>
</html>
